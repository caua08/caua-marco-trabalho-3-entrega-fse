; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
; Plataforma ESP32 fixada para evitar mudancas de versao que quebraram o build.
platform = espressif32@6.10.0

; Placa generica ESP32 DevKit, compativel com o modulo usado no projeto.
board = esp32dev

; O codigo usa APIs Arduino em cima do ESP32.
framework = arduino

; Porta USB/serial onde a placa apareceu no Windows.
upload_port = COM3

; Velocidade do monitor serial, igual ao Serial.begin(115200).
monitor_speed = 115200

; Forca Arduino.h em todos os arquivos compilados.
; Isso contorna um problema da versao usada da biblioteca ESP32-BLE-Gamepad.
build_flags =
	-include Arduino.h

; Framework Arduino ESP32 fixado em versao que compila com esse toolchain.
platform_packages =
	platformio/framework-arduinoespressif32@3.20014.231204

; Biblioteca que implementa o dispositivo BLE HID do tipo gamepad.
lib_deps = lemmingdev/ESP32-BLE-Gamepad@^0.7.4
